name: AW Recompile (temp)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  recompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: false

      - name: Install gh-aw extension (pinned)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-aw --pin v0.74.8

      - name: Compile build-failure-analysis workflows (strict)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh aw compile build-failure-analysis
          gh aw compile build-failure-analysis-command

      - name: Stage regenerated locks
        run: |
          mkdir -p /tmp/aw-locks
          cp .github/workflows/build-failure-analysis.lock.yml /tmp/aw-locks/
          cp .github/workflows/build-failure-analysis-command.lock.yml /tmp/aw-locks/
          cp .github/workflows/agentic_commands.yml /tmp/aw-locks/

      - name: Upload regenerated locks
        uses: actions/upload-artifact@v4
        with:
          name: regenerated-locks
          path: /tmp/aw-locks/
          if-no-files-found: error
