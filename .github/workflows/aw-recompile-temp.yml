name: AW Recompile (temp)

# Temporary helper: regenerates the gh-aw .lock.yml files for the
# build-failure-analysis workflows in a network-enabled environment
# (strict-mode digest pinning cannot run behind the local firewall).
# Safe to delete once the locks are committed.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  recompile:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          persist-credentials: true

      - name: Install gh-aw extension (pinned)
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh extension install github/gh-aw --pin v0.74.8

      - name: Compile build-failure-analysis workflows (strict)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh aw compile build-failure-analysis
          gh aw compile build-failure-analysis-command

      - name: Show resulting diff
        run: git --no-pager diff -- '*.lock.yml' .github/workflows/agentic_commands.yml || true

      - name: Commit regenerated locks
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/build-failure-analysis.lock.yml \
                  .github/workflows/build-failure-analysis-command.lock.yml \
                  .github/workflows/agentic_commands.yml
          if git diff --cached --quiet; then
            echo "No lock changes to commit."
          else
            git commit -m "Recompile build-failure-analysis lock files for binlog-mcp container switch

          Co-authored-by: Copilot <223556219+Copilot@users.noreply.github.com>"
            git push origin HEAD:${{ github.ref_name }}
          fi
